name: 🔄 Mise à jour prix et liens

on:
  schedule:
    - cron: '0 6 * * *'   # Tous les jours à 06h00 UTC (08h00 Paris)
  workflow_dispatch:       # Déclenchement manuel possible depuis GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Nécessaire pour committer les changements

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4 lxml

      - name: Vérifier et mettre à jour les prix et liens
        run: cd tondeuse && python scripts/update_prices.py

      - name: Committer les changements si nécessaire
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add tondeuse/index.html tondeuse/fiche.html tondeuse/robots.html tondeuse/comparatif.html tondeuse/classement.html tondeuse/quiz.html tondeuse/choisir_robot_tondeuse_2026.html tondeuse/PRICE_HISTORY.md tondeuse/LINKS_HISTORY.md
            git commit -m "chore: mise à jour prix et liens $(date +%Y-%m-%d)"
            git push
          else
            echo "✅ Aucun changement de prix ni de liens détecté."
          fi
