<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#16a34a"/>
  <!-- Robot body -->
  <rect x="16" y="22" width="32" height="20" rx="4" fill="#fff"/>
  <!-- Robot "eyes" / sensor panel -->
  <rect x="22" y="27" width="7" height="5" rx="2" fill="#16a34a"/>
  <rect x="35" y="27" width="7" height="5" rx="2" fill="#16a34a"/>
  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="3" fill="#4ade80"/>
  <!-- Wheels -->
  <ellipse cx="20" cy="44" rx="6" ry="4" fill="#166534"/>
  <ellipse cx="44" cy="44" rx="6" ry="4" fill="#166534"/>
  <!-- Cutting blade indicator -->
  <circle cx="32" cy="40" r="3" fill="#4ade80"/>
</svg>
